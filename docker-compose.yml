# ============================================================================
# ModelServe — Docker Compose (Local Development)
# ============================================================================
# TODO: Define your complete local development stack.
#
# Required services:
#   - PostgreSQL (MLflow backend store)
#   - Redis (Feast online store)
#   - MLflow Tracking Server (depends on Postgres)
#   - FastAPI Inference Service (depends on MLflow, Redis)
#   - Prometheus (scrapes FastAPI /metrics) — add in Sessions 3-4
#   - Grafana (reads from Prometheus) — add in Sessions 3-4
#
# For each service, consider:
#   - Which Docker image to use
#   - What ports to expose
#   - What environment variables to pass
#   - What volumes to mount for persistence
#   - What healthcheck to configure
#   - What depends_on relationships exist
#   - What network to attach to
#
# The entire stack must start with a single: docker compose up
# ============================================================================

# ModelServe — local development stack (Phases 1–2)
# Prerequisites: copy .env.example to .env
#   cp .env.example .env
# Start everything:
#   docker compose up -d
# Base services only (operations doc 2.4):
#   docker compose up -d postgres redis mlflow

name: modelserve

networks:
  modelserve:
    driver: bridge

volumes:
  pgdata: {}
  mlflow_artifacts: {}
  prometheus_data: {}
  grafana_data: {}

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mlflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mlflow}
      POSTGRES_DB: ${POSTGRES_DB:-mlflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow} -d ${POSTGRES_DB:-mlflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [modelserve]

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_S3_IGNORE_TLS: "true"
    # --serve-artifacts + --artifacts-destination: clients on the HOST upload via HTTP.
    # Using only --default-artifact-root without serving makes the client try file:/mlflow/... on the
    # host -> PermissionError. See README (MLflow artifacts from host).
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --allowed-hosts "*"
      --cors-allowed-origins "*"
      --backend-store-uri postgresql://${POSTGRES_USER:-mlflow}:${POSTGRES_PASSWORD:-mlflow}@postgres:5432/${POSTGRES_DB:-mlflow}
      --serve-artifacts
      --artifacts-destination /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/')",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks: [modelserve]

  redis:
    image: redis:7-alpine

    restart: unless-stopped

    command: >
      redis-server
      --appendonly yes
      --save 60 1000

    ports:
      - "6379:6379"

    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "ping"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - modelserve

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: modelserve-api

    restart: unless-stopped

    depends_on:
      mlflow:
        condition: service_healthy

      redis:
        condition: service_healthy

    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000

      MODEL_NAME: ${MODEL_NAME:-modelserve-model}

      MODEL_STAGE: ${MODEL_STAGE:-Production}

      FEAST_REPO_PATH: /app/feast_repo

      REDIS_HOST: redis
      REDIS_PORT: 6379

      FASTAPI_HOST: 0.0.0.0
      FASTAPI_PORT: 8000

    ports:
      - "8000:8000"

    volumes:
      - ./:/app

    working_dir: /app

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000

    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

    networks:
      - modelserve

  prometheus:
    image: prom/prometheus:v2.52.0

    restart: unless-stopped

    depends_on:
      fastapi:
        condition: service_healthy

    ports:
      - "9090:9090"

    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro

      - prometheus_data:/prometheus

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://127.0.0.1:9090/-/healthy"
        ]
      interval: 15s
      timeout: 5s
      retries: 10

    networks:
      - modelserve

  grafana:
    image: grafana/grafana:11.0.0

    restart: unless-stopped

    depends_on:
      prometheus:
        condition: service_healthy

    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}

      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin123}

      GF_USERS_ALLOW_SIGN_UP: "false"

    ports:
      - "3000:3000"

    volumes:
      - grafana_data:/var/lib/grafana

      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro

      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://127.0.0.1:3000/api/health"
        ]
      interval: 15s
      timeout: 5s
      retries: 10

    networks:
      - modelserve

  node-exporter:
    image: prom/node-exporter:v1.8.1

    restart: unless-stopped

    ports:
      - "9100:9100"

    command:
      - "--path.rootfs=/host"

    pid: host

    volumes:
      - "/:/host:ro,rslave"

    networks:
      - modelserve